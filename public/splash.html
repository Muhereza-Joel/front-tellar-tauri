<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loading...</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: #111;
        color: #fff;
        font-family: sans-serif;
      }
      img {
        width: 96px;
        height: 96px;
        margin-bottom: 1rem;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #fff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- This uses your app icon from Tauri (replace with path to your icon asset) -->
    <img src="icons/icon.png" alt="App Icon" />
    <div class="spinner"></div>
  </body>
</html>
